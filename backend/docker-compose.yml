services:
  db:
    image: postgres:16-alpine
    container_name: yidao-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fastapi-template-db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yidao-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yidao-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yidao-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: yidao-web
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${APP_PORT:-9000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yidao-network
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: yidao-celery-worker
    command: celery -A app.tasks worker --loglevel=info
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - yidao-network
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: yidao-celery-beat
    command: celery -A app.tasks beat --loglevel=info
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - yidao-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  yidao-network:
    driver: bridge
