# CD Pipeline - Deploy to environments
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]

  # 手动触发部署
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Deploy to QA (auto on main/master merge)
  # ============================================================================
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'qa')
    environment:
      name: qa
      url: https://qa.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to QA
        run: |
          echo "🚀 Deploying to QA environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # TODO: Add your deployment commands here
          # Examples:
          # - kubectl set image deployment/app app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # - ssh user@qa-server 'docker-compose pull && docker-compose up -d'
          # - aws ecs update-service --cluster qa --service app --force-new-deployment

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          # TODO: Add health check
          # curl -f https://qa.example.com/health || exit 1

  # ============================================================================
  # Deploy to Production (manual trigger only)
  # ============================================================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://example.com

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to Production environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # TODO: Add your production deployment commands here

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          # TODO: Add health check
          # curl -f https://example.com/health || exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          # TODO: Send notification (Slack, Teams, etc.)

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Production deployment failed!"
          # TODO: Send alert notification
