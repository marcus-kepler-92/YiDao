# QA environment override - use with: docker compose -f docker-compose.yml -f docker-compose-qa.yml up
services:
  web:
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
    environment:
      DEBUG: "false"
      ENVIRONMENT: "qa"
      LOG_LEVEL: "INFO"
    volumes: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  celery_worker:
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    environment:
      LOG_LEVEL: "INFO"
    volumes: []
    restart: always

  db:
    restart: always
    ports: []

  redis:
    restart: always
    ports: []
