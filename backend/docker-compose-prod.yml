# Production environment override - use with: docker compose -f docker-compose.yml -f docker-compose-prod.yml up
services:
  web:
    command: >
      gunicorn app.main:app
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --access-logfile -
      --error-logfile -
      --log-level warning
    environment:
      DEBUG: "false"
      ENVIRONMENT: "prod"
      LOG_LEVEL: "WARNING"
    volumes: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    command: celery -A app.tasks worker --loglevel=warning --concurrency=4 --prefetch-multiplier=4
    environment:
      LOG_LEVEL: "WARNING"
    volumes: []
    restart: always

  db:
    restart: always
    ports: []
    environment:
      POSTGRES_INITDB_ARGS: "-E UTF8"
    command: postgres -c max_connections=200 -c shared_buffers=256MB

  redis:
    restart: always
    ports: []
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
